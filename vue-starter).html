<!DOCTYPE html>
<html lang="en">

<head>
    <script type='text/javascript' src=></script>
    <meta charset="UTF-8" />
    <title>Vue starter</title>
    <style>
        :root {
            --searød: #EA5347;
            --petrol: #3C7D87;
            --dybblå: #002430;
            --sand: #DED4D2;
            --sand25: #F7F4F4;
        }

        body {
            background-color: var(--sand25);
        }

        header {
            background-color: var(--dybblå);
            display: flex;
            justify-content: space-between;
            height: 10%;
            padding: 10px;
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
        }

        header img {
            width: 50px;
            height: 20px;
        }

        #profil {
            border-radius: 100px;
            background-color: var(--searød);
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #profil p {
            color: white;
        }

        input,
        button {
            color: white;
            background-color: var(--petrol);
            border: 1, 5px solid var(--dybblå);
            border-radius: 5px;
            padding: 5px;
        }

        #inputthing {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8%;
        }

        #circle {
            border-radius: 100px;
            border: 1.5px solid var(--searød);
            width: 110px;
            height: 110px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .week {
            display: flex;
            background-color: var(--sand);
            border-radius: 76.5px;
            padding: 10px;
            height: fit-content;
            gap: 25px;
            width: fit-content;
            padding-right: 50px;
            margin-bottom: 15px;
        }

        .days {
            display: flex;
            flex-wrap: wrap;
        }

        .day {
            background-color: #F2E0DF;
            border-radius: 25px;
            padding: 5px 20px;
        }

        .dayHeader {
            display: flex;
            justify-content: space-between;
        }

        .gray {
            color: var(--dybblå);
        }
    </style>
</head>


<body>
    <div id="app">
        <header>
            <img src="/image 2.png" alt="logo">
            <div id="profil">
                <p>MF</p>
            </div>
        </header>
        <section>
            <article class="top">
                <h1>Multimedieproduktion 2</h1>
                <article id="inputthing">
                    <input type="text" placeholder="Søg">
                    <button>Filter</button>
                </article>
            </article>
            <section v-for="content of moodleData.weeks">
                <section class="week">
                    <div id="circle">
                        <h2>{{content.week_number}}</h2>
                    </div>
                    <article>
                        <h2> {{ content.week_label }} </h2>
                        <div class="days">
                            <p>Mandag</p>
                            <p>Tirsdag</p>
                            <p>Onsdag</p>
                            <p>Torsdag</p>
                            <p>Fredag</p>
                        </div>
                    </article>
                </section>
                <article class="day" v-for="daily of content.days">
                    <div class="dayHeader">
                        <h3> {{ daily.day_name }} </h3>
                        <p class="gray">Uge {{ content.week_number }}</p>
                    </div>
                    <li v-for="lists of daily.items">
                        <ol>{{ lists.title }}</ol>
                    </li>
                    <p class="gray">Vis flere</p>
                </article>
            </section>
        </section>

        <section>
            <button>tilbage</button>
            <article>
                <div class="newdayHeader">
                    <h3>Mandag</h3>
                    <p class="gray">Dato</p>
                </div>
                <li>
                    <ol> </ol>
                </li>
            </article>
        </section>


    </div>

    <!-- Vue import (skal komme før Vue.createApp) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        Vue.createApp({
            data() {
                return {
                    moodleData: [
                        {
                        }
                    ]
                }
            },

            created() {
                this.getData()
            },

            methods: {
                async getData() {
                    let file = await fetch('https://lms.mironpingel.dk/')
                    let data = await file.json()
                    console.log(data)

                    this.moodleData = data
                }

                // Tilføj funktioner her...
            }
        }).mount('#app')
    </script>


</body>

</html>
