<!DOCTYPE html>
<html lang="en">

<head>
    <script type='text/javascript' src=></script>
    <meta charset="UTF-8" />
    <title>Vue starter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Exo:ital,wght@0,100..900;1,100..900&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --searød: #EA5347;
            --petrol: #3C7D87;
            --dybblå: #002430;
            --dybblå25: #918E8F;
            --sand: #DED4D2;
            --ler25: rgba(227, 163, 159, 0.25);
            --sand25: rgba(222, 212, 210, 0.25);
        }

        body {
            background-color: var(--sand25);
            width: 500px;
        }

        h1,
        h2,
        h3,
        h6,
        p,
        input,
        button,
        li {
            font-family: "Poppins";
        }

        p,
        input,
        button {
            font-size: 14px;
            font-weight: 400;
        }

        li {
            list-style-type: none;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            justify-self: center;
        }

        h2 {
            font-size: 14px;
            font-weight: 700;
        }

        h3 {
            font-size: 20px;
            font-weight: 700;
        }

        h6 {
            font-size: 48px;
            font-weight: 500;
            color: var(--petrol);
        }

        header {
            background-color: var(--dybblå);
            display: flex;
            justify-content: space-between;
            height: 10%;
            padding: 10px;

        }

        header img {
            width: 50px;
            height: 20px;
        }

        #profil {
            border-radius: 100px;
            background-color: var(--searød);
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #profil p {
            color: white;
        }

        input,
        button {
            color: white;
            background-color: var(--petrol);
            border: 1, 5px solid var(--dybblå);
            border-radius: 5px;
            padding: 5px;
            width: 100%;
        }
        ::placeholder {
            color: white;
        }

        #inputthing {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8%;
            gap: 50px;
        }

        .all {
            display: flex;
            flex-direction: column-reverse;
        }


        .circle {
            border: 3px solid var(--petrol);
            border-radius: 100px;
            width: 110px;
            height: 110px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .currentcircle {
            border-radius: 100px;
            border: 3px solid var(--searød);
            width: 110px;
            height: 110px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .colour {
            color: var(--searød);
        }

        .week {
            display: flex;
            background-color: var(--sand25);
            border-radius: 76.5px;
            padding: 10px;
            height: fit-content;
            gap: 25px;
            padding-right: 50px;
            margin-bottom: 15px;
        }

        .days {
            display: flex;
            flex-wrap: wrap;
        }

        .day {
            background-color: #F2E0DF;
            border-radius: 25px;
            padding: 5px 20px;
            margin-bottom: 10px;
        }

        .dayHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .gray {
            color: var(--dybblå25);
        }

        .lesson {
            background-color: var(--sand25);
            border-radius: 25px;
            padding: 0 20px;
        }

        .goBack {
            width: 25%;
            background-color: var(--sand25);
            color: var(--dybblå);
            margin-bottom: 20px;
        }

        #button2,
        #button {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #button2 {
            padding: 5px 0  5px 15px;
        }
    </style>
</head>


<body>
    <div id="app">
        <header>
            <img src="/image 2.png" alt="logo">
            <div id="profil">
                <p>MF</p>
            </div>
        </header>
        <section>
            <article class="top">
                <h1>Multimedieproduktion 2</h1>
                <article id="inputthing">
                    <input type="text" placeholder=" Søg">
                    <button id="button2"> <img src="filter.png" alt="">Filter</button>
                </article>
            </article>
            <section class="all">
                <section v-for="content of moodleData.weeks" @click="toggleAccordion(content.week_number)"
                    v-if="!selectedDay">
                    <section class="week">
                        <div class="circle" :class="{'currentcircle' : content.is_current === true}">
                            <h6 :class="{'colour' : content.is_current === true}">{{content.week_number}} </h2>
                        </div>
                        <article>
                            <h2> {{ content.week_label }} </h2>
                        </article>
                    </section>
                    <article class="day" v-for="daily of content.days" @click="selectedThing(daily)"
                        v-if="content.week_number === selectedWeek">
                        <div class="dayHeader">
                            <h3> {{ daily.day_name }} </h3>
                            <p class="gray">Uge {{ content.week_number }}</p>
                        </div>
                        <li v-for="lists of daily.items">
                            <ol>{{ lists.title }}</ol>
                        </li>
                        <div id="button">
                        <p class="gray">Se lektion</p> <img src="arrow.png" alt="">
                    </div>
                    </article>
                </section>
            </section>
        </section>

        <section v-if="selectedDay">
            <button id="button2" class="goBack" @click="goBack()"> <img src="backArrow.png" alt="">tilbage</button>
            <article class="lesson">
                <div class="dayHeader">
                    <h3>{{ selectedDay.day_name }} </h3>
                    <p class="gray">{{ selectedDay.date }} </p>
                </div>
                <li v-for="lesson of selectedDay.items">
                    <ol>{{ lesson.title}} </ol>
                    <p v-html="lesson.content_html"></p>
                </li>
            </article>
        </section>


    </div>

    <!-- Vue import (skal komme før Vue.createApp) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        Vue.createApp({
            data() {
                return {
                    moodleData: [
                        {
                        }
                    ],

                    selectedDay: null,
                    selectedWeek: null
                }
            },

            created() {
                this.getData()
            },

            methods: {
                async getData() {
                    let file = await fetch('https://lms.mironpingel.dk/')
                    let data = await file.json()

                    this.moodleData = data
                },

                selectedThing(selectedDay) {
                    this.selectedDay = selectedDay
                },

                toggleAccordion(weekNumber) {
                    this.selectedWeek = weekNumber
                },

                goBack() {
                    this.selectedDay = null
                }

            }
        }).mount('#app')
    </script>


</body>

</html>
